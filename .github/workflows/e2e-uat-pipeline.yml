name: UAT End-to-End Pipeline

on:
  pull_request:
    branches: [uat]
    paths:
      - 'force-app/**'
      - '.github/workflows/e2e-uat-pipeline.yml'
      - '.github/sf-scanner-waivers.csv'
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Scanner to run'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - checkmarx
        - fortify
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - rollback
      rollback_commit_sha:
        description: 'Commit SHA for rollback'
        required: false
        type: string
      rollback_pr_number:
        description: 'PR number for rollback'
        required: false
        type: string

env:
  ORG_ALIAS: ${{ vars.ORG_ALIAS || 'uat' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '85' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'force-app/main/default' }}
  SFDX_AUTH_SECRET_NAME: ${{ vars.SFDX_AUTH_SECRET_NAME || 'CRT_UAT_AUTHURL' }}
  DELTA_FROM_COMMIT: ${{ vars.DELTA_FROM_COMMIT }}
  FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION }}
  SCA_ENFORCEMENT_MODE: ${{ vars.SCA_ENFORCEMENT_MODE || 'enforce' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run-checkmarx: ${{ steps.check.outputs.run-checkmarx }}
      run-fortify: ${{ steps.check.outputs.run-fortify }}
    steps:
    - name: Check scanner availability
      id: check
      run: |
        echo "run-checkmarx=${{ secrets.CX_CLIENT_SECRET != '' }}" >> $GITHUB_OUTPUT
        echo "run-fortify=${{ secrets.FOD_CLIENT_SECRET != '' }}" >> $GITHUB_OUTPUT
    if: github.event_name != 'pull_request_review'

  salesforce-validation:
    needs: setup
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_delta: ${{ steps.delta.outputs.has_delta }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - run: npm install
    - run: npm install -g @salesforce/cli
    - name: Authenticate org
      run: sf org login sfdx-url --sfdx-url-file <(echo "$SFDX_AUTH_URL") --alias $ORG_ALIAS --set-default
      env:
        SFDX_AUTH_URL: ${{ secrets.CRT_UAT_AUTHURL }}
    - name: Extract test classes from PR
      id: extract
      run: |
        # Extract from body and comments
        # Pattern: Tests: Class1, Class2
        TESTS=""
        # Implementation needed
        echo "tests=$TESTS" >> $GITHUB_OUTPUT
    - name: Install sfdx-git-delta
      run: sf plugins install sfdx-git-delta
    - name: Build delta package
      run: |
        sf sgd source delta --to HEAD --from $DELTA_FROM_COMMIT --output .
    - uses: actions/upload-artifact@v4
      with:
        name: delta-package
        path: package/
    - name: Compute Apex delta
      id: delta
      run: |
        # Infer test classes by *Test, *Tests, *TestClass
        # Set has_delta based on package.xml or destructiveChanges.xml
        HAS_DELTA="false"
        if [ -f package/package.xml ] && grep -q "<members>" package/package.xml; then
          HAS_DELTA="true"
        fi
        if [ -f destructiveChanges/destructiveChanges.xml ] && grep -q "<members>" destructiveChanges/destructiveChanges.xml; then
          HAS_DELTA="true"
        fi
        echo "has_delta=$HAS_DELTA" >> $GITHUB_OUTPUT
    - name: Validate deployment
      if: steps.delta.outputs.has_delta == 'true'
      run: |
        TEST_LEVEL=""
        if [ -n "$TESTS" ]; then
          TEST_LEVEL="--test-level RunSpecifiedTests --tests $TESTS"
        fi
        DEPLOY_ID=$(sf project deploy validate --async --source-dir $SOURCE_DIR $TEST_LEVEL --coverage-formatters json-summary --results-dir results --wait 0 | jq -r '.result.id')
        # Poll every 15s
        while true; do
          STATUS=$(sf project deploy resume --job-id $DEPLOY_ID --coverage-formatters json-summary --results-dir results | jq -r '.result.status')
          if [ "$STATUS" = "Succeeded" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
            break
          fi
          sleep 15
        done
        # Show progress table, component breakdown, coverage
    - name: Check Apex coverage
      if: steps.delta.outputs.has_delta == 'true'
      run: |
        COVERAGE=$(jq '.summary.orgWideCoverage' results/coverage.json)
        if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
          echo "Coverage $COVERAGE% below threshold $COVERAGE_THRESHOLD%"
          exit 1
        fi
    - name: Install scanner
      if: steps.delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
      run: sf plugins install @salesforce/sfdx-scanner
    - name: Detect waiver file tampering
      if: steps.delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
      run: |
        if git diff --name-only HEAD~1 | grep -q '.github/sf-scanner-waivers.csv'; then
          echo "::warning::Waiver file modified in PR, but waivers are always read from main"
        fi
    - name: Fetch SCA waivers from main
      if: env.SCA_ENFORCEMENT_MODE != 'off'
      run: |
        # Fetch via GitHub API
        curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${{ github.repository }}/contents/.github/sf-scanner-waivers.csv?ref=main \
          -o fetched-waivers.csv
    - name: Detect changed files
      id: changed
      if: env.SCA_ENFORCEMENT_MODE != 'off'
      run: |
        CHANGED_FILES=$(git diff --name-only HEAD~1 | grep -E '\.(cls|trigger|js|html|css)$' | tr '\n' ',')
        if [ -n "$CHANGED_FILES" ]; then
          echo "has_targets=true" >> $GITHUB_OUTPUT
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
        else
          echo "has_targets=false" >> $GITHUB_OUTPUT
        fi
    - name: Run scanner
      if: steps.changed.outputs.has_targets == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
      run: sf scanner run --target ${{ steps.changed.outputs.changed_files }} --format csv --outfile sfdx-report.csv --severity-threshold 3
      continue-on-error: true
    - name: Check results against waivers
      if: steps.changed.outputs.has_targets == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
      run: |
        python3 -c "
import csv
import sys
from datetime import datetime

def parse_date(date_str):
    for fmt in ['%d-%m-%Y', '%d/%m/%Y', '%Y-%m-%d']:
        try:
            return datetime.strptime(date_str, fmt)
        except ValueError:
            pass
    raise ValueError(f'Unable to parse date: {date_str}')

# Load waivers
waivers = {}
with open('fetched-waivers.csv', 'r') as f:
    reader = csv.DictReader(f)
    for row in reader:
        key = (row['Rule'], row['File'], row['Line'])
        waivers[key] = row

# Load report
violations = []
with open('sfdx-report.csv', 'r') as f:
    reader = csv.DictReader(f)
    for row in reader:
        violations.append(row)

# Check
with open('sca-governance-report.csv', 'w', newline='') as f:
    writer = csv.writer(f)
    writer.writerow(['Status', 'Rule', 'File', 'Line', 'Severity', 'Description', 'Expiry', 'Days_Left', 'Reason', 'Approved_By', 'Approved_Date', 'Ticket'])
    for v in violations:
        key = (v['Rule'], v['File'], v['Line'])
        if key in waivers:
            expiry = parse_date(waivers[key]['Expiry'])
            days_left = (expiry - datetime.now()).days
            if days_left > 30:
                status = 'WAIVED'
            elif days_left > 0:
                status = 'WAIVED_EXPIRING_SOON'
            else:
                status = 'EXPIRED_WAIVER'
                if env.SCA_ENFORCEMENT_MODE == 'enforce':
                    sys.exit(1)
        else:
            status = 'VIOLATION'
        writer.writerow([status, v['Rule'], v['File'], v['Line'], v['Severity'], v['Description'], waivers.get(key, {}).get('Expiry', ''), days_left if key in waivers else '', waivers.get(key, {}).get('Reason', ''), waivers.get(key, {}).get('Approved_By', ''), waivers.get(key, {}).get('Approved_Date', ''), waivers.get(key, {}).get('Ticket', '')])
        "
    - name: Post SCA governance report as PR comment
      if: steps.changed.outputs.has_targets == 'true' && github.event_name == 'pull_request' && env.SCA_ENFORCEMENT_MODE != 'off'
      run: |
        # Delete previous comment
        COMMENTS=$(curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments | jq -r '.[] | select(.body | contains("SCA Governance Report")) | .id')
        for id in $COMMENTS; do
          curl -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/issues/comments/$id
        done
        # Post new comment
        REPORT=$(cat sca-governance-report.csv)
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "{\"body\": \"## SCA Governance Report\n\`\`\`csv\n$REPORT\n\`\`\`\"}"
    - name: Upload scanner reports
      uses: actions/upload-artifact@v4
      with:
        name: sfdx-scanner-reports
        path: |
          sfdx-report.csv
          sca-governance-report.csv
          fetched-waivers.csv

  sca-sast-stage:
    needs: setup
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - run: npm install
    - name: Run npm audit
      run: npm audit --json > audit.json
    - name: Check against waivers
      run: |
        # Check audit.json against .github/sca-waivers.json
        # Fail on unwaived/expired

  automated-governance:
    needs: salesforce-validation
    if: needs.salesforce-validation.outputs.has_delta == 'true'
    runs-on: ubuntu-latest
    steps:
    - run: echo "Automated hard gates"

  checkmarx-sast:
    needs: setup
    if: needs.setup.outputs.run-checkmarx == 'true'
    runs-on: ubuntu-latest
    steps:
    - run: echo "CheckMarx AST Scan"

  fortify-sast-dast:
    needs: setup
    if: needs.setup.outputs.run-fortify == 'true'
    runs-on: ubuntu-latest
    steps:
    - run: echo "Fortify SAST + optional DAST"

  approval-merge-gate:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    outputs:
      merge_commit_sha: ${{ steps.merge.outputs.sha }}
    steps:
    - name: Verify approval freshness
      run: |
        # Check if approval is recent
    - name: Merge PR
      id: merge
      run: |
        # Merge PR
        # Output sha

  deploy-after-merge:
    needs: approval-merge-gate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Build delta package
      id: delta_pkg
      run: |
        FROM_COMMIT=$(git rev-parse HEAD^1)
        if [ -z "$FROM_COMMIT" ]; then
          FROM_COMMIT=$DELTA_FROM_COMMIT
        fi
        sf sgd source delta --to HEAD --from $FROM_COMMIT --output .
        echo "merge_base=$FROM_COMMIT" >> $GITHUB_OUTPUT
    - name: Deploy to UAT
      run: |
        DEPLOY_ID=$(sf project deploy start --async --source-dir $SOURCE_DIR --wait 0 | jq -r '.result.id')
        # Poll
    - name: Build deployment package
      run: |
        # Create package.xml etc
    - uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: |
          package.xml
          destructiveChanges.xml
          components.zip
          deployment-info.json
        retention-days: 90
    - name: Commit to pr_packages branch
      run: |
        # Commit package folder to orphan branch
    - name: Update DELTA_FROM_COMMIT
      run: |
        SHA=$(git rev-parse HEAD)
        curl -L -X PATCH -H "Authorization: Bearer ${{ secrets.GH_PAT }}" -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/actions/variables/DELTA_FROM_COMMIT \
          -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"$SHA\"}"

  trigger-crt-tests:
    needs: deploy-after-merge
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.crt.outputs.build_id }}
      crt_status: ${{ steps.crt.outputs.crt_status }}
    steps:
    - name: Trigger CRT build
      id: crt
      run: |
        # GraphQL mutation
